<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giants Projects Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fa;
  color: #0B1F3B;
}

.header {
  background: #0B1F3B;
  color: white;
  text-align: center;
  padding: 40px 20px;
}

.logo {
  width: 200px;
}

h1 {
  margin: 10px 0;
}

.container {
  padding: 40px 20px;
  max-width: 1100px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card a {
  text-decoration: none;
  color: #0B1F3B;
  font-weight: bold;
}

.tag {
  font-size: 12px;
  background: #F28C28;
  color: white;
  display: inline-block;
  padding: 5px 10px;
  border-radius: 20px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Projects Portfolio</h1>
  <p>Engineering • Construction • Infrastructure</p>
</div>

<div class="container">

<div class="grid">

  <div class="card">
    <img src="assets/images/project1.jpg">
    <div class="card-content">
      <a href="projects/project1.html">Road Construction Project</a>
      <div class="tag">Civil Works</div>
    </div>
  </div>

  <div class="card">
    <img src="assets/images/project2.jpg">
    <div class="card-content">
      <a href="projects/project2.html">Landscaping Project</a>
      <div class="tag">Landscaping</div>
    </div>
  </div>

</div>

</div>

</body>
</html>
