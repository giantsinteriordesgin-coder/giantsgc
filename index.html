<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giants General Contracting</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}

.hero{
  height:100vh;
  background:#0B1F3B;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.content{
  position:relative;
  z-index:2;
}

.logo{
  width:400px;
  cursor:pointer;
  margin-bottom:20px;
  transition:0.3s;
}

.logo:hover{transform:scale(1.05);}

nav{
  position:absolute;
  top:20px;
  right:20px;
  z-index:3;
}

nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
  font-weight:bold;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 26px;
  background:#F28C28;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

.section{
  padding:80px 20px;
  text-align:center;
  background:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
  margin-top:40px;
}

.card{
  background:#f5f7fa;
  padding:25px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  background:white;
}

footer{
  background:#0B1F3B;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<div class="hero">

  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="content">

    <a href="index.html">
      <img src="assets/logo.png" class="logo">
    </a>

    <h1>Giants General Contracting</h1>
    <p>Engineering • Construction • Infrastructure</p>

    <a href="projects.html" class="btn">View Projects</a>

  </div>

</div>

<div class="section">

  <h2>Our Services</h2>

  <div class="grid">
    <div class="card">Civil Construction</div>
    <div class="card">Infrastructure Works</div>
    <div class="card">Landscaping</div>
    <div class="card">HVAC Systems</div>
    <div class="card">Interior Fit-Out</div>
  </div>

</div>

<footer>© 2026 Giants General Contracting</footer>

</body>
</html>
