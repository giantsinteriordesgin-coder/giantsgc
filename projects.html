<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Giants General Contracting</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}

nav{
  position:absolute;
  top:20px;
  right:20px;
  z-index:10;
}

/* لما اللغة عربي */
body[dir="rtl"] nav{
  right:auto;
  left:20px;
}
nav a{color:white;margin-left:15px;text-decoration:none;font-weight:bold;}
nav button{margin-left:15px;padding:6px 12px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;}

/* HERO */
.hero{
  height:70vh;
  background:#0B1F3B;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
}
.hero-content{position:relative;z-index:2;}

.logo{width:220px;margin-bottom:20px;cursor:pointer;}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 26px;
  background:#F28C28;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

.section{padding:80px 20px;text-align:center;background:white;}
.section-dark{background:#f5f7fa;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
  margin-top:40px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  transition:0.4s;
  text-align:center;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  padding:15px;
  margin:0;
}

.card:hover{
  transform:translateY(-10px);
}

/* RTL */
body[dir="rtl"]{text-align:right;}
</style>
</head>

<body>

<div class="hero">
 <nav>

   data-en="Home"
   data-ar="الرئيسية">Home</a>

<a href="services.html"

   data-ar="الخدمات">Services</a>

<a href="projects.html"
   data-en="Projects"
   data-ar="المشاريع">Projects</a>

<a href="about.html"
   data-en="About"
   data-ar="من نحن">About</a>

<a href="contact.html"
   data-en="Contact"
   data-ar="تواصل معنا">Contact</a>

    <button onclick="toggleLang()">AR</button>
  </nav>

  <div class="hero-content">
    <a href="index.html">
      <img src="assets/logo.png" class="logo">
    </a>
    <h1 data-en="Our Projects" data-ar="مشاريعنا">Our Projects</h1>
  </div>

</div>

<div class="grid">

  <div class="card">
    <img src="assets/images/project1.jpg" alt="Project">
    <h3 data-en="District9 Mall - 6th of October" data-ar="مول ديستريكت 9 - السادس من اكتوبر">
      Landscaping
    </h3>
  </div>

  <div class="card">
    <img src="assets/images/project2.jpeg" alt="Project">
    <h3 data-en="Sophya Compound - Elmokattam" data-ar="كمبوند صوفيا - المقطم">
      Landscaping Project
    </h3>
  </div>

</div>

</div>

</body>
</html>
