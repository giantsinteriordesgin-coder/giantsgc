<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}

header{background:#0B1F3B;text-align:center;padding:30px;}

.logo{width:180px;cursor:pointer;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{width:100%;}
</style>
</head>

<body>

<header>
  <a href="index.html">
    <img src="assets/logo.png" class="logo">
  </a>
</header>

<div class="grid">
  <div class="card">
    <img src="assets/images/project1.jpg">
    <p>Road Construction</p>
  </div>

  <div class="card">
    <img src="assets/images/project2.jpg">
    <p>Landscaping Works</p>
  </div>
</div>

</body>
</html>
