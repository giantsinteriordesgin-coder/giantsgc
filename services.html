<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services | Giants General Contracting</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

/* NAV (Orascom style) */
nav{
  position:absolute;
  top:20px;
  right:20px;
  z-index:10;
}

nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
  font-weight:bold;
  opacity:0.9;
}

nav a:hover{
  opacity:1;
}

/* HERO */
.hero{
  height:70vh;
  background:#0B1F3B;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
  overflow:hidden;
}

/* DARK OVERLAY */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
}

/* HERO CONTENT */
.hero-content{
  position:relative;
  z-index:2;
  animation:fadeUp 1s ease;
}

/* LOGO */
.logo{
  width:220px;
  cursor:pointer;
  margin-bottom:20px;
  transition:0.3s;
}

.logo:hover{
  transform:scale(1.05);
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 26px;
  background:#F28C28;
  color:white;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
  background:white;
}

.section-dark{
  background:#f5f7fa;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
  margin-top:40px;
}

/* CARDS */
.card{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="hero">

  <nav>
   <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="hero-content">
    <a href="index.html">
      <img src="assets/logo.png" class="logo">
    </a>
    <h1>Our Services</h1>
  </div>

</div>

<div class="section">
  <div class="grid">
    <div class="card">Civil Construction Works</div>
    <div class="card">Infrastructure Development</div>
    <div class="card">Landscaping & Irrigation</div>
    <div class="card">HVAC Systems</div>
    <div class="card">Interior Fit-Out</div>
  </div>
</div>

</body>
</html>
